services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contacts_backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/contacts_db
      - PORT=4000
      - CORS_ORIGIN=https://s10ogrtz718p9q1cuhqpeq5s.auto-deploy.mobilesentrix.com/api,http://localhost:3000,*
    # volumes:
    #   - ./backend/dist:/app/dist
    #   - ./backend/node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://localhost:4000/healthz').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contacts_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE=https://s10ogrtz718p9q1cuhqpeq5s.auto-deploy.mobilesentrix.com/api
    # volumes:
    #   - ./frontend/dist:/app/dist
    #   - ./frontend/node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16
    container_name: contacts_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contacts_db
    ports:
      - "5432:5432"
    volumes:
      - contacts_pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contacts_db"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  contacts_pgdata:

